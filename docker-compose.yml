services:
  mysql:
    image: mysql:9.3.0
    container_name: mysql-logistics
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "db_orders"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-logistics
    ports:
      - "15672:15672" # Management Web UI
      - "5672:5672" # RabbitMQ Port
    restart: always

  mongodb:
    image: mongo:latest
    container_name: mongodb-logistics
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    restart: always

  redis:
    image: redis/redis-stack:latest
    container_name: redis-logistics
    ports:
      - "6379:6379"
      - "8001:8001" # Redis Insight
    restart: always

  orchestrator:
    build:
      context: ./ms-logistics-orchestrator
    container_name: ms-logistics-orchestrator
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_orchestrator?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - mysql
      - rabbitmq
    restart: always

  stock-mock:
    build:
      context: ./ms-logistics-stock
    container_name: ms-logistics-stock
    ports:
      - "8084:8084"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq
    restart: always

  command:
    build:
      context: ./ms-logistics-command
    container_name: ms-logistics-command
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_orders
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - mysql
      - rabbitmq
    restart: always

  query:
    build:
      context: ./ms-logistics-query
    container_name: ms-logistics-query
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_MONGODB_URI: mongodb://root:example@mongodb:27017/db_queries?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - rabbitmq
      - mongodb
      - redis
    restart: always
