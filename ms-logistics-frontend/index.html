<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dashboard | Peak Resilience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h2 { font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--text-dim); }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: var(--text-dim); }
        input, select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            color: white;
            font-size: 0.9rem;
            transition: border 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 1rem;
        }
        button:hover { opacity: 0.9; }

        .order-list { display: flex; flex-direction: column; gap: 1rem; }
        .order-item {
            background: rgba(255,255,255,0.02);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        .order-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.04); }

        .order-info h3 { font-size: 1rem; margin-bottom: 0.2rem; }
        .order-info p { font-size: 0.8rem; color: var(--text-dim); }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-received { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        .status-shipped { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-delivered { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        .actions { display: flex; gap: 0.5rem; }
        .btn-small { width: auto; padding: 0.4rem 0.8rem; font-size: 0.75rem; margin-top: 0; }
        .btn-outline { background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); }
        .btn-outline:hover { border-color: white; color: white; }

        .history {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-dim);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 0.5rem;
        }
        .history-item { margin-bottom: 0.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LOGISTICS TRACKER</h1>
            <div id="connection-status" style="font-size: 0.7rem; color: var(--success)">● System Online</div>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Create New Order</h2>
                <div class="form-group">
                    <label>Order Number</label>
                    <input type="text" id="orderNumber" placeholder="e.g. ORD-100">
                </div>
                <div class="form-group">
                    <label>Customer</label>
                    <input type="text" id="customer" placeholder="Full name">
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <input type="text" id="product" placeholder="Product name">
                </div>
                <button onclick="createOrder()">Register Order</button>
            </div>

            <div class="card">
                <h2>Real-time Projections (Query Side)</h2>
                <div id="order-list" class="order-list">
                    <!-- Orders will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const COMMAND_API = 'http://localhost:8081/api/v1/orders';
        const QUERY_API = 'http://localhost:8082/api/v1/queries/orders';

        async function fetchOrders() {
            try {
                const response = await fetch(QUERY_API);
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                console.error('Error fetching orders:', error);
            }
        }

        async function createOrder() {
            const orderNumber = document.getElementById('orderNumber').value;
            const customer = document.getElementById('customer').value;
            const product = document.getElementById('product').value;

            if (!orderNumber || !customer || !product) return alert('Fill all fields');

            const payload = { orderNumber, customer, product };

            try {
                await fetch(COMMAND_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Clear form
                document.getElementById('orderNumber').value = '';
                document.getElementById('customer').value = '';
                document.getElementById('product').value = '';
                
                // Refresh list after a delay for eventual consistency
                setTimeout(fetchOrders, 1000);
            } catch (error) {
                alert('Error creating order');
            }
        }

        async function updateStatus(id, newStatus) {
            try {
                await fetch(`${COMMAND_API}/${id}/status?newStatus=${newStatus}`, {
                    method: 'PATCH'
                });
                setTimeout(fetchOrders, 1000);
            } catch (error) {
                alert('Error updating status');
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('order-list');
            list.innerHTML = orders.map(order => `
                <div class="order-item">
                    <div class="order-info">
                        <h3>${order.orderNumber} - ${order.product}</h3>
                        <p>${order.customer}</p>
                        <div class="history">
                            <strong>History:</strong>
                            ${order.history.map(h => `
                                <div class="history-item">${h.status} - ${new Date(h.date).toLocaleTimeString()}</div>
                            `).join('')}
                        </div>
                    </div>
                    <div style="text-align: right">
                        <span class="status-badge status-${order.lastStatus.toLowerCase()}">${order.lastStatus}</span>
                        <div class="actions" style="margin-top: 1rem">
                            ${order.lastStatus === 'RECEIVED' ? `<button class="btn-small btn-outline" onclick="updateStatus(${order.orderId}, 'SHIPPED')">SHIP</button>` : ''}
                            ${order.lastStatus === 'SHIPPED' ? `<button class="btn-small btn-outline" onclick="updateStatus(${order.orderId}, 'DELIVERED')">DELIVER</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (orders.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-dim)">No orders found.</p>';
            }
        }

        // Poll for updates every 3 seconds
        setInterval(fetchOrders, 3000);
        fetchOrders();
    </script>
</body>
</html>
